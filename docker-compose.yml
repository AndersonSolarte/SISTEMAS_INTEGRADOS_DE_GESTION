services:
  db:
    image: postgres:16-alpine
    container_name: sgc-db
    profiles: ["docker-db"]
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "127.0.0.1:${DB_PORT_HOST:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 10

  python-service:
    build:
      context: ./python-service
      dockerfile: Dockerfile
    container_name: sgc-python-service
    restart: unless-stopped
    environment:
      FRONTEND_URL: ${PUBLIC_APP_URL}
      DB_HOST: ${HOST_DB_HOST:-host.docker.internal}
      DB_PORT: ${HOST_DB_PORT:-5432}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5)"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sgc-backend
    restart: unless-stopped
    environment:
      PORT: 5000
      NODE_ENV: production
      DB_HOST: ${HOST_DB_HOST:-host.docker.internal}
      DB_PORT: ${HOST_DB_PORT:-5432}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRE: ${JWT_EXPIRE:-7d}
      FRONTEND_URL: ${PUBLIC_APP_URL}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      INSTITUTIONAL_EMAIL_DOMAIN: ${INSTITUTIONAL_EMAIL_DOMAIN:-unicesmag.edu.co}
      AUTH_GOOGLE_ONLY: ${AUTH_GOOGLE_ONLY:-true}
      GOOGLE_SHEETS_ID: ${GOOGLE_SHEETS_ID:-}
      GOOGLE_SHEETS_TAB: ${GOOGLE_SHEETS_TAB:-}
      GOOGLE_SERVICE_ACCOUNT_JSON: /app/keys/google-service-account.json
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-}
      SABER_PRO_PYTHON_URL: http://python-service:8000
      SABER_PRO_PYTHON_TIMEOUT_MS: ${SABER_PRO_PYTHON_TIMEOUT_MS:-15000}
      AI_PROVIDER: ${AI_PROVIDER:-auto}
      AI_PROVIDER_TIMEOUT_MS: ${AI_PROVIDER_TIMEOUT_MS:-7000}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.0-flash}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4.1-mini}
      OLLAMA_URL: ${OLLAMA_URL:-http://host.docker.internal:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.1:8b}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      python-service:
        condition: service_healthy
    ports:
      - "127.0.0.1:${BACKEND_PORT_HOST:-5000}:5000"
    volumes:
      - backend_uploads:/app/uploads
      - ./backend/keys:/app/keys:ro
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:5000/api/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        REACT_APP_API_URL: /api
        REACT_APP_NAME: ${REACT_APP_NAME:-Sistema de Gestion de Calidad}
        REACT_APP_VERSION: ${REACT_APP_VERSION:-1.0.0}
        REACT_APP_GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
    container_name: sgc-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT_HOST:-8080}:80"
      - "${FRONTEND_SSL_PORT_HOST:-443}:443"
    volumes:
      - ./fullchain.pem:/etc/nginx/certs/fullchain.pem:ro
      - ./Cert_planeacion.key:/etc/nginx/certs/Cert_planeacion.key:ro

volumes:
  postgres_data:
  backend_uploads:
